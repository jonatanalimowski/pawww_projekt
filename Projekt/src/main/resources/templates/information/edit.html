<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet">
    <title>Register - StoreEverything</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<main class="main-content">
    <div class="paper">
<h1>Edytuj informację</h1>

<form th:action="@{/information/edit/{id}(id=${information.id})}" method="post">
    <div>
        <label>Tytuł:</label>
        <input type="text" name="title" th:value="${information.title}" required/>
    </div>
    <div>
        <label>Treść:</label>
        <textarea name="content" th:text="${information.content}" required></textarea>
    </div>
    <button type="submit">Zapisz zmiany</button>
</form>

<a href="/information">Wróć</a>
    </div>
</main>
</body>
</html>
