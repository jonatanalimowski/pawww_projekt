<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet">
    <title>Information, List - StoreEverything</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>

<body>

<div th:replace="~{elements/navbar :: navbar}"></div>

<main class="main-content list-layout">
    <div class="paper list-paper" th:if="${#authorization.expression('hasRole(''FULL'')')}">
        <h1>Moje notatki</h1>
        <div class="group-row">
        <h2>Filtrowanie i sortowanie</h2>
        <div class="actions" style="justify-content: flex-start; margin-bottom: 2rem;">
            <a class="btn-secondary"
               th:href="@{/information(sortBy='title', sortDir=${sortBy == 'title' and sortDir == 'asc' ? 'desc' : 'asc'}, categoryId=${selectedCategoryId}, date=${selectedDate})}">
                Tytuł <span th:if="${sortBy == 'title'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
            </a>
            <a class="btn-secondary"
               th:href="@{/information(sortBy='addedDate', sortDir=${sortBy == 'addedDate' and sortDir == 'asc' ? 'desc' : 'asc'}, categoryId=${selectedCategoryId}, date=${selectedDate})}">
                Data <span th:if="${sortBy == 'addedDate'}" th:text="${sortDir == 'asc' ? '▲' : '▼'}"></span>
            </a>
        </div>
        </div>
        <form th:action="@{/information}" method="get" class="filters">
            <div class="filter-item">
                <label>Kategoria:</label>
                <select name="categoryId">
                    <option value="">Wszystkie</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == selectedCategoryId}"></option>
                </select>
            </div>

            <div class="filter-item">
                <label>Data:</label>
                <input type="date" name="date" th:value="${selectedDate}"/>
            </div>

            <div class="filter-actions actions">
                <button type="submit" class="btn-primary">Filtruj</button>
                <a th:href="@{/information}" class="btn-secondary">Wyczyść filtry</a>
            </div>
        </form>

        <div th:if="${#lists.isEmpty(information)}" class="notes-content">
            <p>Brak własnych informacji.</p>
        </div>

        <table th:unless="${#lists.isEmpty(information)}">
            <thead>
            <tr>
                <th>Tytuł</th>
                <th>Treść</th>
                <th>Kategoria</th>
                <th>Data dodania</th>
                <th>Akcje</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="info : ${information}">
                <td th:text="${info.title}"></td>
                <td th:text="${info.content}"></td>
                <td th:text="${info.category != null ? info.category.name : '-'}"></td>
                <td th:text="${info.addedDate}"></td>
                <td class="table-actions">
                    <a th:href="@{/information/sharelink/{id}(id=${info.id})}" class="btn-secondary">Link</a>
                    <form th:action="@{/information/share-user}" method="post" class="share-form">
                        <input type="hidden" name="informationId" th:value="${info.id}"/>
                        <input type="text" name="username" placeholder="Użytkownik" required/>
                        <button type="submit" class="btn-secondary">Udostępnij</button>
                    </form>
                    <div class="group-row">
                        <a th:href="@{/information/edit/{id}(id=${info.id})}" class="btn-secondary">Edytuj</a>
                        <form th:action="@{/information/delete/{id}(id=${info.id})}" method="post">
                            <button type="submit" class="btn-primary">Usuń</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="paper list-paper" th:if="${#authorization.expression('hasAnyRole(''FULL'',''LIMITED'')')}">
        <h2>Notatki udostępnione Tobie</h2>

        <div th:if="${#lists.isEmpty(sharedWithMe)}" class="notes-content">
            <p>Nikt jeszcze nic Ci nie udostępnił.</p>
        </div>

        <table th:unless="${#lists.isEmpty(sharedWithMe)}">
            <thead>
            <tr>
                <th>Tytuł</th>
                <th>Treść</th>
                <th>Właściciel</th>
                <th>Data dodania</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="info : ${sharedWithMe}">
                <td th:text="${info.title}"></td>
                <td th:text="${info.content}"></td>
                <td th:text="${info.owner.username}"></td>
                <td th:text="${info.addedDate}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
