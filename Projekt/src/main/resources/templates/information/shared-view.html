<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&display=swap" rel="stylesheet">
    <title>Information, Shared view - StoreEverything</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>
<body>
<div th:replace="~{elements/navbar :: navbar}"></div>
<main class="main-content">
    <div class="form-container paper">
        <h1 th:text="${information.title}"></h1>
        <p class="notes-content" th:text="${information.content}"></p>

        <p class="notes-footer">Dodano: <span th:text="${information.addedDate}"></span></p>
        <p class="notes-footer">Autor: <span th:text="${information.owner.username}"></span></p>
    </div>
</main>
</body>
</html>
