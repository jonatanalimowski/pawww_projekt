<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" , lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Home - StoreEverything</title>
</head>
<body>
    <h1>Witaj użytkowniku</h1>
    <h3>Jesteś zalogowany jako: <span th:text="${username}"></span></h3>

    <div sec:authorize="hasRole('ADMIN')">
        <a href="/admin/users">Panel admina</a>
    </div>

    <div sec:authorize="hasRole('FULL')">
        <a href="/information">Moje notatki</a>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit">Wyloguj się</button>
    </form>
</body>
</html>
